site_name: DeltaLLM Documentation
site_description: Open-source LLM gateway with unified API, RBAC, guardrails, and observability
site_url: https://deltallm.readthedocs.io
repo_url: https://github.com/deltawi/deltallm
repo_name: deltallm

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true
  - attr_list
  - def_list

nav:
  - Home: index.md
  - Getting Started:
      - getting-started/index.md
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
      - MCP Quick Start: getting-started/mcp-quickstart.md
      - Docker: getting-started/docker.md
  - Configuration:
      - configuration/index.md
      - Model Deployments: configuration/models.md
      - Router Settings: configuration/router.md
      - General Settings: configuration/general.md
  - Features:
      - features/index.md
      - Authentication & SSO: features/authentication.md
      - MCP Gateway & Tools: features/mcp.md
      - Routing & Failover: features/routing.md
      - Caching: features/caching.md
      - Guardrails: features/guardrails.md
      - Rate Limiting: features/rate-limiting.md
      - Budgets & Spend: features/budgets.md
      - Audit Log: features/audit-log.md
      - Observability: features/observability.md
  - Admin UI:
      - Overview: admin-ui/index.md
      - Dashboard: admin-ui/dashboard.md
      - AI Gateway:
          - Models: admin-ui/models.md
          - Named Credentials: admin-ui/named-credentials.md
          - Route Groups: admin-ui/route-groups.md
          - Prompt Registry: admin-ui/prompt-registry.md
          - MCP Servers: admin-ui/mcp.md
      - Access:
          - API Keys: admin-ui/api-keys.md
          - Organizations: admin-ui/organizations.md
          - Teams: admin-ui/teams.md
          - People & Access: admin-ui/people-and-access.md
      - Operations:
          - Usage & Spend: admin-ui/usage.md
          - Audit Logs: admin-ui/audit-logs.md
          - Batch Jobs: admin-ui/batch-jobs.md
          - Guardrails: admin-ui/guardrails.md
          - Settings: admin-ui/settings.md
  - API Reference:
      - api/index.md
      - Proxy Endpoints: api/proxy.md
      - MCP Gateway & Tooling: api/mcp.md
      - Admin Endpoints: api/admin.md
      - Health & Metrics: api/health.md
  - Deployment:
      - deployment/index.md
      - Docker: deployment/docker.md
      - Governance Rollout: deployment/governance.md
      - Kubernetes: deployment/kubernetes.md
      - Prisma Migration Runbook: deployment/prisma-migration-runbook.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/deltawi/deltallm
