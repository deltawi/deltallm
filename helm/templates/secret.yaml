apiVersion: v1
kind: Secret
metadata:
  name: {{ include "deltallm.fullname" . }}
  labels:
    {{- include "deltallm.labels" . | nindent 4 }}
type: Opaque
stringData:
  master-key: {{ required "config.masterKey is required" .Values.config.masterKey | quote }}
  salt-key: {{ required "config.saltKey is required" .Values.config.saltKey | quote }}
  {{- if and .Values.s3.enabled .Values.s3.secretAccessKey }}
  aws-secret-access-key: {{ .Values.s3.secretAccessKey | quote }}
  {{- end }}
