{{- $dbSecretName := .Values.runtime.database.existingSecret.name -}}
{{- $dbAsyncSecretKey := default .Values.runtime.database.existingSecret.urlKey .Values.runtime.database.existingSecret.asyncUrlKey -}}
{{- $redisSecretName := .Values.runtime.redis.existingSecret.name -}}
{{- $s3SecretName := include "deltallm.s3SecretName" . -}}
{{- $hasGeneratedAppSecret := not .Values.secret.existingSecret -}}
{{- $hasGeneratedS3Secret := and .Values.s3.enabled (not .Values.s3.existingSecret.name) (or .Values.s3.accessKeyId .Values.s3.secretAccessKey) -}}
{{- $hasRuntimeDependencies := or $dbSecretName .Values.runtime.database.url .Values.postgresql.enabled $redisSecretName .Values.runtime.redis.url .Values.redis.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "deltallm.fullname" . }}
  labels:
    {{- include "deltallm.labels" . | nindent 4 }}
spec:
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  minReadySeconds: {{ .Values.minReadySeconds }}
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  strategy:
    type: {{ .Values.strategy.type }}
    {{- if eq .Values.strategy.type "RollingUpdate" }}
    rollingUpdate:
      maxUnavailable: {{ .Values.strategy.rollingUpdate.maxUnavailable }}
      maxSurge: {{ .Values.strategy.rollingUpdate.maxSurge }}
    {{- end }}
  selector:
    matchLabels:
      {{- include "deltallm.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "deltallm.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if $hasGeneratedAppSecret }}
        checksum/app-secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- if $hasGeneratedS3Secret }}
        checksum/s3-secret: {{ include (print $.Template.BasePath "/s3-secret.yaml") . | sha256sum }}
        {{- end }}
        {{- if .Values.prometheus.podAnnotations.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.service.port | quote }}
        prometheus.io/path: "/metrics"
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "deltallm.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if and .Values.dependencyWait.enabled $hasRuntimeDependencies }}
      initContainers:
        - name: wait-for-runtime-dependencies
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          command:
            - python
            - -c
            - |
              import os
              import socket
              import sys
              import time
              from urllib.parse import urlparse

              deadline = time.time() + {{ .Values.dependencyWait.timeoutSeconds }}
              interval = {{ .Values.dependencyWait.periodSeconds }}
              targets = []

              database_url = os.getenv("DATABASE_URL", "").strip()
              if database_url:
                  parsed = urlparse(database_url)
                  targets.append(("database", parsed.hostname, parsed.port or 5432))

              redis_url = os.getenv("REDIS_URL", "").strip()
              if redis_url:
                  parsed = urlparse(redis_url)
                  targets.append(("redis", parsed.hostname, parsed.port or 6379))

              for name, host, port in targets:
                  while True:
                      try:
                          with socket.create_connection((host, port), timeout=5):
                              print(f"{name} is reachable at {host}:{port}", flush=True)
                              break
                      except OSError as exc:
                          if time.time() >= deadline:
                              print(f"Timed out waiting for {name} at {host}:{port}: {exc}", file=sys.stderr, flush=True)
                              raise SystemExit(1)
                          print(f"Waiting for {name} at {host}:{port}: {exc}", flush=True)
                          time.sleep(interval)
          env:
            {{- if or $dbSecretName .Values.runtime.database.url .Values.postgresql.enabled }}
            - name: DATABASE_URL
              {{- if $dbSecretName }}
              valueFrom:
                secretKeyRef:
                  name: {{ $dbSecretName }}
                  key: {{ .Values.runtime.database.existingSecret.urlKey }}
              {{- else if .Values.runtime.database.url }}
              value: {{ .Values.runtime.database.url | quote }}
              {{- else }}
              value: {{ include "deltallm.bundledDatabaseUrl" . | quote }}
              {{- end }}
            {{- end }}
            {{- if or $redisSecretName .Values.runtime.redis.url .Values.redis.enabled }}
            - name: REDIS_URL
              {{- if $redisSecretName }}
              valueFrom:
                secretKeyRef:
                  name: {{ $redisSecretName }}
                  key: {{ .Values.runtime.redis.existingSecret.urlKey }}
              {{- else if .Values.runtime.redis.url }}
              value: {{ .Values.runtime.redis.url | quote }}
              {{- else }}
              value: {{ include "deltallm.bundledRedisUrl" . | quote }}
              {{- end }}
            {{- end }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- with .Values.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: {{ .Values.service.port | quote }}
            - name: DELTALLM_CONFIG_PATH
              value: /app/config/config.yaml
            - name: DELTALLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "deltallm.appSecretName" . }}
                  key: {{ .Values.secret.keys.masterKey }}
            - name: DELTALLM_SALT_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "deltallm.appSecretName" . }}
                  key: {{ .Values.secret.keys.saltKey }}
            {{- if or $dbSecretName .Values.runtime.database.url .Values.postgresql.enabled }}
            - name: DATABASE_URL
              {{- if $dbSecretName }}
              valueFrom:
                secretKeyRef:
                  name: {{ $dbSecretName }}
                  key: {{ .Values.runtime.database.existingSecret.urlKey }}
              {{- else if .Values.runtime.database.url }}
              value: {{ .Values.runtime.database.url | quote }}
              {{- else }}
              value: {{ include "deltallm.bundledDatabaseUrl" . | quote }}
              {{- end }}
            - name: DELTALLM_DATABASE_URL
              {{- if $dbSecretName }}
              valueFrom:
                secretKeyRef:
                  name: {{ $dbSecretName }}
                  key: {{ $dbAsyncSecretKey }}
              {{- else if .Values.runtime.database.asyncUrl }}
              value: {{ .Values.runtime.database.asyncUrl | quote }}
              {{- else if .Values.runtime.database.url }}
              value: {{ .Values.runtime.database.url | replace "postgresql://" "postgresql+asyncpg://" | quote }}
              {{- else }}
              value: {{ include "deltallm.bundledAsyncDatabaseUrl" . | quote }}
              {{- end }}
            {{- end }}
            {{- if or $redisSecretName .Values.runtime.redis.url .Values.redis.enabled }}
            - name: REDIS_URL
              {{- if $redisSecretName }}
              valueFrom:
                secretKeyRef:
                  name: {{ $redisSecretName }}
                  key: {{ .Values.runtime.redis.existingSecret.urlKey }}
              {{- else if .Values.runtime.redis.url }}
              value: {{ .Values.runtime.redis.url | quote }}
              {{- else }}
              value: {{ include "deltallm.bundledRedisUrl" . | quote }}
              {{- end }}
            - name: DELTALLM_REDIS_URL
              {{- if $redisSecretName }}
              valueFrom:
                secretKeyRef:
                  name: {{ $redisSecretName }}
                  key: {{ .Values.runtime.redis.existingSecret.urlKey }}
              {{- else if .Values.runtime.redis.url }}
              value: {{ .Values.runtime.redis.url | quote }}
              {{- else }}
              value: {{ include "deltallm.bundledRedisUrl" . | quote }}
              {{- end }}
            {{- end }}
            {{- if .Values.s3.enabled }}
            - name: AWS_DEFAULT_REGION
              value: {{ .Values.s3.region | quote }}
            - name: DELTALLM_S3_BUCKET
              value: {{ .Values.s3.bucket | quote }}
            {{- if or .Values.s3.existingSecret.name .Values.s3.accessKeyId }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ $s3SecretName }}
                  key: {{ .Values.s3.existingSecret.accessKeyIdKey }}
            {{- end }}
            {{- if or .Values.s3.existingSecret.name .Values.s3.secretAccessKey }}
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $s3SecretName }}
                  key: {{ .Values.s3.existingSecret.secretAccessKeyKey }}
            {{- end }}
            {{- end }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.probes.startup.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.probes.startup.path }}
              port: http
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "deltallm.fullname" . }}-config
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- range . }}
        - maxSkew: {{ .maxSkew }}
          topologyKey: {{ .topologyKey }}
          whenUnsatisfiable: {{ .whenUnsatisfiable }}
          {{- with .minDomains }}
          minDomains: {{ . }}
          {{- end }}
          {{- with .nodeAffinityPolicy }}
          nodeAffinityPolicy: {{ . }}
          {{- end }}
          {{- with .nodeTaintsPolicy }}
          nodeTaintsPolicy: {{ . }}
          {{- end }}
          {{- with .matchLabelKeys }}
          matchLabelKeys:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          labelSelector:
            {{- if .labelSelector }}
{{ toYaml .labelSelector | indent 12 }}
            {{- else }}
              matchLabels:
                {{- include "deltallm.selectorLabels" $ | nindent 16 }}
            {{- end }}
        {{- end }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
