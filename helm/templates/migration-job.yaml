{{- if .Values.migrationJob.enabled }}
{{- $dbSecretName := .Values.runtime.database.existingSecret.name -}}
{{- $redisSecretName := .Values.runtime.redis.existingSecret.name -}}
{{- $s3SecretName := include "deltallm.s3SecretName" . -}}
{{- $migrationStateLeaseName := include "deltallm.migrationStateLeaseName" . -}}
{{- $migrationIdentityConfigMapName := include "deltallm.migrationIdentityConfigMapName" . -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "deltallm.migrationJobName" . }}
  labels:
    {{- include "deltallm.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  {{- with .Values.migrationJob.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  backoffLimit: {{ .Values.migrationJob.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.migrationJob.activeDeadlineSeconds }}
  ttlSecondsAfterFinished: {{ .Values.migrationJob.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "deltallm.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "deltallm.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          command:
            {{- toYaml .Values.migrationJob.command | nindent 12 }}
          args:
            {{- toYaml .Values.migrationJob.args | nindent 12 }}
          env:
            - name: DELTALLM_MIGRATION_IDENTITY_CONFIGMAP_NAME
              value: {{ $migrationIdentityConfigMapName | quote }}
            - name: DELTALLM_MIGRATION_STATE_LEASE_NAME
              value: {{ $migrationStateLeaseName | quote }}
            - name: DELTALLM_RELEASE_REVISION
              value: {{ .Release.Revision | quote }}
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: DELTALLM_CONFIG_PATH
              value: /app/config/config.yaml
            - name: DELTALLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "deltallm.appSecretName" . }}
                  key: {{ .Values.secret.keys.masterKey }}
            - name: DELTALLM_SALT_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "deltallm.appSecretName" . }}
                  key: {{ .Values.secret.keys.saltKey }}
            {{- if or $dbSecretName .Values.runtime.database.url .Values.postgresql.enabled }}
            - name: DATABASE_URL
              {{- if $dbSecretName }}
              valueFrom:
                secretKeyRef:
                  name: {{ $dbSecretName }}
                  key: {{ .Values.runtime.database.existingSecret.urlKey }}
              {{- else if .Values.runtime.database.url }}
              value: {{ .Values.runtime.database.url | quote }}
              {{- else }}
              value: {{ include "deltallm.bundledDatabaseUrl" . | quote }}
              {{- end }}
            {{- end }}
            {{- if or $redisSecretName .Values.runtime.redis.url .Values.redis.enabled }}
            - name: REDIS_URL
              {{- if $redisSecretName }}
              valueFrom:
                secretKeyRef:
                  name: {{ $redisSecretName }}
                  key: {{ .Values.runtime.redis.existingSecret.urlKey }}
              {{- else if .Values.runtime.redis.url }}
              value: {{ .Values.runtime.redis.url | quote }}
              {{- else }}
              value: {{ include "deltallm.bundledRedisUrl" . | quote }}
              {{- end }}
            - name: DELTALLM_REDIS_URL
              {{- if $redisSecretName }}
              valueFrom:
                secretKeyRef:
                  name: {{ $redisSecretName }}
                  key: {{ .Values.runtime.redis.existingSecret.urlKey }}
              {{- else if .Values.runtime.redis.url }}
              value: {{ .Values.runtime.redis.url | quote }}
              {{- else }}
              value: {{ include "deltallm.bundledRedisUrl" . | quote }}
              {{- end }}
            {{- end }}
            {{- if .Values.s3.enabled }}
            - name: AWS_DEFAULT_REGION
              value: {{ .Values.s3.region | quote }}
            - name: DELTALLM_S3_BUCKET
              value: {{ .Values.s3.bucket | quote }}
            {{- if or .Values.s3.existingSecret.name .Values.s3.accessKeyId }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ $s3SecretName }}
                  key: {{ .Values.s3.existingSecret.accessKeyIdKey }}
            {{- end }}
            {{- if or .Values.s3.existingSecret.name .Values.s3.secretAccessKey }}
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $s3SecretName }}
                  key: {{ .Values.s3.existingSecret.secretAccessKeyKey }}
            {{- end }}
            {{- end }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
            - name: migration-api-access
              mountPath: /var/run/secrets/deltallm-migration
              readOnly: true
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.migrationJob.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "deltallm.fullname" . }}-config
        - name: migration-api-access
          projected:
            sources:
              - serviceAccountToken:
                  path: token
                  expirationSeconds: 3600
              - configMap:
                  name: kube-root-ca.crt
                  items:
                    - key: ca.crt
                      path: ca.crt
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
{{- end }}
