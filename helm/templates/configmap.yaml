{{- define "deltallm.configYaml" -}}
{{- $root := .root -}}
{{- $cfg := .config -}}
model_list:
{{ toYaml $cfg.model_list | indent 2 }}

router_settings:
{{ toYaml $cfg.router_settings | indent 2 }}

deltallm_settings:
  fallbacks:
{{ toYaml $cfg.deltallm_settings.fallbacks | indent 4 }}
  context_window_fallbacks:
{{ toYaml $cfg.deltallm_settings.context_window_fallbacks | indent 4 }}
  content_policy_fallbacks:
{{ toYaml $cfg.deltallm_settings.content_policy_fallbacks | indent 4 }}
  guardrails:
{{ toYaml $cfg.deltallm_settings.guardrails | indent 4 }}
  turn_off_message_logging: {{ $cfg.deltallm_settings.turn_off_message_logging }}
  success_callback:
    {{- $successCallbacks := default (list) $cfg.deltallm_settings.success_callback }}
    {{- if not (has "prometheus" $successCallbacks) }}
    {{- $successCallbacks = append $successCallbacks "prometheus" }}
    {{- end }}
    {{- if and $root.Values.s3.enabled (not (has "s3" $successCallbacks)) }}
    {{- $successCallbacks = append $successCallbacks "s3" }}
    {{- end }}
{{ toYaml $successCallbacks | indent 4 }}
  failure_callback:
    {{- $failureCallbacks := default (list) $cfg.deltallm_settings.failure_callback }}
    {{- if not (has "prometheus" $failureCallbacks) }}
    {{- $failureCallbacks = append $failureCallbacks "prometheus" }}
    {{- end }}
    {{- if and $root.Values.s3.enabled (not (has "s3" $failureCallbacks)) }}
    {{- $failureCallbacks = append $failureCallbacks "s3" }}
    {{- end }}
{{ toYaml $failureCallbacks | indent 4 }}
  callbacks:
    {{- $callbacks := default (list) $cfg.deltallm_settings.callbacks }}
    {{- if not (has "prometheus" $callbacks) }}
    {{- $callbacks = append $callbacks "prometheus" }}
    {{- end }}
{{ toYaml $callbacks | indent 4 }}
  {{- $callbackSettings := deepCopy (default (dict) $cfg.deltallm_settings.callback_settings) }}
  {{- if $root.Values.s3.enabled }}
  {{- $s3Callback := dict "bucket" $root.Values.s3.bucket "region" $root.Values.s3.region "prefix" $root.Values.s3.prefix }}
  {{- if $root.Values.s3.compression }}
  {{- $_ := set $s3Callback "compression" $root.Values.s3.compression }}
  {{- end }}
  {{- $_ := set $callbackSettings "s3" $s3Callback }}
  {{- end }}
  callback_settings:
    {{- if $callbackSettings }}
{{ toYaml $callbackSettings | indent 4 }}
    {{- else }}
    {}
    {{- end }}

general_settings:
{{ toYaml $cfg.general_settings | indent 2 }}
{{- end -}}
{{- define "deltallm.apiConfigYaml" -}}
{{- $apiConfig := deepCopy .Values.config -}}
{{- if .Values.batchWorker.enabled -}}
{{- $apiDefaults := dict "general_settings" (dict "embeddings_batch_worker_enabled" false "embeddings_batch_completion_outbox_worker_enabled" false "embeddings_batch_gc_enabled" false "embeddings_batch_create_session_cleanup_enabled" false "embeddings_batch_scheduler_backfill_enabled" false "embeddings_batch_stale_lease_sweeper_enabled" false) -}}
{{- $apiConfig = mergeOverwrite $apiConfig $apiDefaults -}}
{{- end -}}
{{- $apiValues := default (dict) (get .Values "api") -}}
{{- $apiConfig = mergeOverwrite $apiConfig (default (dict) (get $apiValues "config")) -}}
{{ include "deltallm.configYaml" (dict "root" . "config" $apiConfig) }}
{{- end -}}
{{- define "deltallm.batchWorkerConfigYaml" -}}
{{- $workerConfig := deepCopy .Values.config -}}
{{- $workerGeneral := default (dict) (get $workerConfig "general_settings") -}}
{{- if not (hasKey $workerConfig "general_settings") -}}
{{- $_ := set $workerConfig "general_settings" $workerGeneral -}}
{{- end -}}
{{- $workerDefaults := dict "embeddings_batch_worker_enabled" true "embeddings_batch_completion_outbox_worker_enabled" true "embeddings_batch_gc_enabled" true "embeddings_batch_create_session_cleanup_enabled" true "embeddings_batch_scheduler_backfill_enabled" true "embeddings_batch_stale_lease_sweeper_enabled" true "embeddings_batch_worker_concurrency" 2 "embeddings_batch_item_claim_limit" 10 -}}
{{- range $key, $value := $workerDefaults -}}
{{- if not (hasKey $workerGeneral $key) -}}
{{- $_ := set $workerGeneral $key $value -}}
{{- end -}}
{{- end -}}
{{- $batchWorkerValues := default (dict) (get .Values "batchWorker") -}}
{{- $workerOverrides := default (dict) (get $batchWorkerValues "config") -}}
{{- $workerOverrideGeneral := default (dict) (get $workerOverrides "general_settings") -}}
{{- if not (hasKey $workerOverrideGeneral "embeddings_batch_scheduler_backfill_enabled") -}}
{{- $_ := set $workerGeneral "embeddings_batch_scheduler_backfill_enabled" true -}}
{{- end -}}
{{- if not (hasKey $workerOverrideGeneral "embeddings_batch_stale_lease_sweeper_enabled") -}}
{{- $_ := set $workerGeneral "embeddings_batch_stale_lease_sweeper_enabled" true -}}
{{- end -}}
{{- $workerConfig = mergeOverwrite $workerConfig $workerOverrides -}}
{{ include "deltallm.configYaml" (dict "root" . "config" $workerConfig) }}
{{- end -}}
{{- define "deltallm.validateBatchConfig" -}}
{{- $apiConfig := include "deltallm.apiConfigYaml" . | fromYaml -}}
{{- $apiGeneral := default (dict) (get $apiConfig "general_settings") -}}
{{- $apiBatchEnabled := default false (get $apiGeneral "embeddings_batch_enabled") -}}
{{- $apiStorageBackend := lower (toString (default "local" (get $apiGeneral "embeddings_batch_storage_backend"))) -}}
{{- $apiS3Bucket := trim (toString (default "" (get $apiGeneral "embeddings_batch_s3_bucket"))) -}}
{{- $apiUsesS3WithoutBucket := and $apiBatchEnabled (eq $apiStorageBackend "s3") (eq $apiS3Bucket "") -}}
{{- if $apiUsesS3WithoutBucket -}}
{{- fail "embeddings_batch_s3_bucket is required when embeddings_batch_storage_backend=s3 and embeddings_batch_enabled=true" -}}
{{- end -}}
{{- if .Values.batchWorker.enabled -}}
{{- $workerConfig := include "deltallm.batchWorkerConfigYaml" . | fromYaml -}}
{{- $workerGeneral := default (dict) (get $workerConfig "general_settings") -}}
{{- $workerBatchEnabled := default false (get $workerGeneral "embeddings_batch_enabled") -}}
{{- $workerStorageBackend := lower (toString (default "local" (get $workerGeneral "embeddings_batch_storage_backend"))) -}}
{{- $workerS3Bucket := trim (toString (default "" (get $workerGeneral "embeddings_batch_s3_bucket"))) -}}
{{- $apiUsesLocalStorage := and $apiBatchEnabled (eq $apiStorageBackend "local") -}}
{{- $workerUsesLocalStorage := and $workerBatchEnabled (eq $workerStorageBackend "local") -}}
{{- $workerUsesS3WithoutBucket := and $workerBatchEnabled (eq $workerStorageBackend "s3") (eq $workerS3Bucket "") -}}
{{- if and (not .Values.batchWorker.allowUnsafeLocalStorage) (or $apiUsesLocalStorage $workerUsesLocalStorage) -}}
{{- fail "batchWorker.enabled=true with embeddings_batch_enabled=true requires shared batch artifact storage; configure embeddings_batch_storage_backend=s3 for API and worker roles, or set batchWorker.allowUnsafeLocalStorage=true for single-node/dev only" -}}
{{- end -}}
{{- if $workerUsesS3WithoutBucket -}}
{{- fail "embeddings_batch_s3_bucket is required when embeddings_batch_storage_backend=s3 and embeddings_batch_enabled=true" -}}
{{- end -}}
{{- end -}}
{{- end -}}
{{- define "deltallm.validateSchedulerConfig" -}}
{{- $role := .role -}}
{{- $general := default (dict) .general -}}
{{- $schedulerModes := list "fifo_v1" "slice_v1" "model_capacity_v1" "fair_share_v1" "smart_v1" -}}
{{- $schedulerShadowModes := list "none" "fifo_v1" "slice_v1" "model_capacity_v1" "fair_share_v1" "smart_v1" -}}
{{- $capacityModes := list "model_capacity_v1" "fair_share_v1" "smart_v1" -}}
{{- $fairShareModes := list "fair_share_v1" "smart_v1" -}}
{{- $schedulerModeSet := hasKey $general "embeddings_batch_scheduler_mode" -}}
{{- $schedulerShadowModeSet := hasKey $general "embeddings_batch_scheduler_shadow_mode" -}}
{{- $schedulerMode := lower (toString (default "" (get $general "embeddings_batch_scheduler_mode"))) -}}
{{- $schedulerShadowMode := lower (toString (default "" (get $general "embeddings_batch_scheduler_shadow_mode"))) -}}
{{- if and $schedulerModeSet (not (has $schedulerMode $schedulerModes)) -}}
{{- fail (printf "%s scheduler mode must be one of fifo_v1, slice_v1, model_capacity_v1, fair_share_v1, smart_v1" $role) -}}
{{- end -}}
{{- if and $schedulerShadowModeSet (not (has $schedulerShadowMode $schedulerShadowModes)) -}}
{{- fail (printf "%s scheduler shadow mode must be one of none, fifo_v1, slice_v1, model_capacity_v1, fair_share_v1, smart_v1" $role) -}}
{{- end -}}
{{- $schedulerEnabled := eq (lower (toString (default false (get $general "embeddings_batch_scheduler_enabled")))) "true" -}}
{{- $schedulerShadowEnabled := eq (lower (toString (default false (get $general "embeddings_batch_scheduler_shadow_enabled")))) "true" -}}
{{- $tenantFairShareEnabled := eq (lower (toString (default false (get $general "embeddings_batch_tenant_fair_share_enabled")))) "true" -}}
{{- $sizeAwareSchedulingEnabled := eq (lower (toString (default false (get $general "embeddings_batch_size_aware_scheduling_enabled")))) "true" -}}
{{- $modelCapacityEnabled := eq (lower (toString (default false (get $general "embeddings_batch_model_capacity_enabled")))) "true" -}}
{{- $activeModeUsesWorkSlice := and $schedulerModeSet (ne $schedulerMode "fifo_v1") -}}
{{- $shadowModeConfigured := and $schedulerShadowModeSet (ne $schedulerShadowMode "none") -}}
{{- $modeControlExplicit := or $schedulerModeSet $schedulerShadowModeSet -}}
{{- $effectiveModelCapacityEnabled := or (and (not $modeControlExplicit) $modelCapacityEnabled) (and $schedulerModeSet (has $schedulerMode $capacityModes)) (and $schedulerShadowModeSet (has $schedulerShadowMode $capacityModes)) -}}
{{- $effectiveTenantFairShareEnabled := or (and (not $modeControlExplicit) $tenantFairShareEnabled) (and $schedulerModeSet (has $schedulerMode $fairShareModes)) (and $schedulerShadowModeSet (has $schedulerShadowMode $fairShareModes)) -}}
{{- $effectiveSizeAwareSchedulingEnabled := or (and (not $modeControlExplicit) $sizeAwareSchedulingEnabled) (and $schedulerModeSet (eq $schedulerMode "smart_v1")) (and $schedulerShadowModeSet (eq $schedulerShadowMode "smart_v1")) -}}
{{- $legacySchedulerConfigured := or $schedulerEnabled $schedulerShadowEnabled $tenantFairShareEnabled $modelCapacityEnabled $sizeAwareSchedulingEnabled -}}
{{- $schedulerConfigured := or (and (not $modeControlExplicit) $legacySchedulerConfigured) $activeModeUsesWorkSlice $shadowModeConfigured -}}
{{- $claimMode := lower (toString (default "job_fifo" (get $general "embeddings_batch_scheduler_claim_mode"))) -}}
{{- if and $schedulerConfigured (not $modeControlExplicit) (ne $claimMode "work_slice") -}}
{{- fail (printf "%s scheduler requires embeddings_batch_scheduler_claim_mode=work_slice when embeddings_batch_scheduler_enabled, embeddings_batch_model_capacity_enabled, embeddings_batch_scheduler_shadow_enabled, embeddings_batch_tenant_fair_share_enabled, or embeddings_batch_size_aware_scheduling_enabled is true" $role) -}}
{{- end -}}
{{- if and (not $modeControlExplicit) $tenantFairShareEnabled (not $effectiveModelCapacityEnabled) -}}
{{- fail (printf "%s tenant fair-share scheduling requires embeddings_batch_model_capacity_enabled=true" $role) -}}
{{- end -}}
{{- if and (not $modeControlExplicit) $sizeAwareSchedulingEnabled (not $effectiveModelCapacityEnabled) -}}
{{- fail (printf "%s size-aware batch scheduling requires embeddings_batch_model_capacity_enabled=true" $role) -}}
{{- end -}}
{{- if and $effectiveSizeAwareSchedulingEnabled (not (or $effectiveTenantFairShareEnabled $schedulerShadowEnabled $shadowModeConfigured)) -}}
{{- fail (printf "%s size-aware batch scheduling requires embeddings_batch_tenant_fair_share_enabled=true or embeddings_batch_scheduler_shadow_enabled=true" $role) -}}
{{- end -}}
{{- if and (not $modeControlExplicit) $schedulerShadowEnabled (not $effectiveModelCapacityEnabled) -}}
{{- fail (printf "%s scheduler shadow mode requires embeddings_batch_model_capacity_enabled=true" $role) -}}
{{- end -}}
{{- end -}}
{{- define "deltallm.validateRenderedConfig" -}}
{{- $apiConfig := include "deltallm.apiConfigYaml" . | fromYaml -}}
{{- $apiGeneral := default (dict) (get $apiConfig "general_settings") -}}
{{- include "deltallm.validateSchedulerConfig" (dict "role" "api" "general" $apiGeneral) -}}
{{- if .Values.batchWorker.enabled -}}
{{- $workerConfig := include "deltallm.batchWorkerConfigYaml" . | fromYaml -}}
{{- $workerGeneral := default (dict) (get $workerConfig "general_settings") -}}
{{- include "deltallm.validateSchedulerConfig" (dict "role" "batchWorker" "general" $workerGeneral) -}}
{{- end -}}
{{- end -}}
{{ include "deltallm.validateBatchConfig" . }}
{{ include "deltallm.validateRenderedConfig" . }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "deltallm.fullname" . }}-config
  labels:
    {{- include "deltallm.labels" . | nindent 4 }}
data:
  config.yaml: |
{{ include "deltallm.apiConfigYaml" . | indent 4 }}
{{- if .Values.batchWorker.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "deltallm.batchWorkerFullname" . }}-config
  labels:
    {{- include "deltallm.batchWorkerLabels" . | nindent 4 }}
data:
  config.yaml: |
{{ include "deltallm.batchWorkerConfigYaml" . | indent 4 }}
{{- end }}
