nameOverride: ""
fullnameOverride: ""

replicaCount: 2
revisionHistoryLimit: 10
minReadySeconds: 5

image:
  repository: deltallm/deltallm
  pullPolicy: IfNotPresent
  tag: "v0.1.26-rc2"
  pullSecrets: []

serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountServiceAccountToken: false

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

service:
  type: ClusterIP
  port: 4000
  annotations: {}
  labels: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

probes:
  startup:
    enabled: true
    path: /health/readiness
    failureThreshold: 30
    periodSeconds: 10
    timeoutSeconds: 5
  liveness:
    path: /health/liveliness
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    path: /health/readiness
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: false
  ingress: []
  egress: []
  allowDns: true

priorityClassName: ""
nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []

command: []
args: []
env: []
envFrom: []
extraVolumes: []
extraVolumeMounts: []

api:
  # Per-role config overrides for the API/UI/gateway Deployment.
  # When batchWorker.enabled=true, Helm automatically disables batch
  # background loops for API pods unless explicitly overridden here.
  config: {}

batchWorker:
  enabled: false
  # Local batch artifact storage is unsafe when API and worker run in separate pods.
  # Set only for single-node/dev split-mode experiments.
  allowUnsafeLocalStorage: false
  replicaCount: 1
  podAnnotations: {}
  podLabels: {}
  priorityClassName: ""
  command: []
  args: []
  env: []
  envFrom: []
  extraVolumes: []
  extraVolumeMounts: []
  service:
    enabled: true
    type: ClusterIP
    port: 4000
    annotations: {}
    labels: {}
  serviceMonitor:
    enabled: true
    namespace: ""
    interval: ""
    scrapeTimeout: ""
    labels: {}
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  # Per-role config overrides for the batch worker Deployment.
  # Shared config.general_settings is used first, then worker-safe defaults
  # are filled for missing keys, then this map is applied last.
  config: {}

dependencyWait:
  enabled: true
  timeoutSeconds: 180
  periodSeconds: 2

secret:
  existingSecret: ""
  keys:
    masterKey: master-key
    saltKey: salt-key
  values:
    masterKey: ""
    saltKey: ""

runtime:
  database:
    url: ""
    existingSecret:
      name: ""
      urlKey: DATABASE_URL
  redis:
    url: ""
    existingSecret:
      name: ""
      urlKey: REDIS_URL

config:
  model_list: []
  router_settings:
    routing_strategy: simple-shuffle
    num_retries: 3
    retry_after: 1
    timeout: 300
    cooldown_time: 60
    allowed_fails: 0
    enable_pre_call_checks: false
    model_group_alias: {}
  deltallm_settings:
    fallbacks: []
    context_window_fallbacks: []
    content_policy_fallbacks: []
    guardrails: []
    success_callback: []
    failure_callback: []
    callbacks: []
    callback_settings: {}
    turn_off_message_logging: false
  general_settings:
    deltallm_key_header_name: Authorization
    upstream_http_connect_timeout_seconds: 10
    upstream_http_read_timeout_seconds: 300
    upstream_http_write_timeout_seconds: 30
    upstream_http_pool_timeout_seconds: 10
    upstream_http_max_connections: 500
    upstream_http_max_keepalive_connections: 100
    upstream_http_keepalive_expiry_seconds: 60
    cache_enabled: false
    cache_backend: memory
    cache_ttl: 3600
    cache_max_size: 10000
    background_health_checks: true
    health_check_interval: 300
    health_check_model: gpt-3.5-turbo
    model_deployment_source: hybrid
    model_deployment_bootstrap_from_config: true
    # Batch API defaults are safe for local/single-replica deployments.
    # If embeddings_batch_enabled is true and replicaCount > 1, configure
    # embeddings_batch_storage_backend: s3 so every pod can read/write artifacts.
    embeddings_batch_enabled: false
    embeddings_batch_worker_enabled: true
    embeddings_batch_completion_outbox_worker_enabled: true
    embeddings_batch_storage_backend: local
    embeddings_batch_storage_dir: .deltallm/batch-artifacts
    embeddings_batch_create_session_cleanup_enabled: true
    embeddings_batch_gc_enabled: true
    # Phase 6 scheduler rollout controls. Leave commented to preserve legacy
    # boolean flag behavior; set explicitly to make this one field control
    # active scheduler behavior.
    # embeddings_batch_scheduler_mode: fifo_v1
    # embeddings_batch_scheduler_shadow_mode: none
    embeddings_batch_scheduler_shadow_decision_timeout_seconds: 0.5
    embeddings_batch_scheduler_shadow_max_pending_decisions: 16
    embeddings_batch_scheduler_enabled: false
    embeddings_batch_scheduler_shadow_enabled: false
    embeddings_batch_scheduler_strict_model_homogeneity_enabled: false
    embeddings_batch_scheduler_default_service_tier: standard
    embeddings_batch_scheduler_estimator_version: v1
    embeddings_batch_scheduler_backfill_enabled: false
    embeddings_batch_scheduler_backfill_interval_seconds: 60
    embeddings_batch_scheduler_backfill_scan_limit: 500
    embeddings_batch_stale_lease_sweeper_enabled: true
    embeddings_batch_stale_lease_sweeper_interval_seconds: 60
    embeddings_batch_stale_lease_sweeper_failure_interval_seconds: 30
    embeddings_batch_stale_lease_sweeper_page_size: 100
    embeddings_batch_stale_lease_sweeper_max_rows_per_run: 500
    embeddings_batch_scheduler_claim_mode: job_fifo
    embeddings_batch_advisory_lock_mode: dual
    embeddings_batch_work_claim_max_items: 0
    embeddings_batch_work_claim_max_work_units: 0
    embeddings_batch_work_claim_min_items_for_microbatch: 4
    embeddings_batch_model_capacity_enabled: false
    embeddings_batch_default_model_max_in_flight: 16
    embeddings_batch_default_model_max_claim_work_units: 64
    embeddings_batch_model_capacity_fraction: 0.25
    embeddings_batch_model_capacity_refresh_seconds: 5
    embeddings_batch_model_capacity_fail_open: false
    embeddings_batch_tenant_fair_share_enabled: false
    embeddings_batch_scheduler_base_quantum_work_units: 16
    embeddings_batch_scheduler_max_deficit_multiplier: 8
    embeddings_batch_tenant_max_in_flight_work_units: 0
    embeddings_batch_tenant_max_queued_work_units: 0
    embeddings_batch_scheduler_max_active_flows_per_decision: 100
    embeddings_batch_scheduler_max_candidate_jobs_per_flow: 50
    embeddings_batch_tenant_scope_preference: organization,team,api_key,user
    embeddings_batch_tenant_fair_share_disabled_model_groups: []
    embeddings_batch_size_aware_scheduling_enabled: false
    embeddings_batch_aging_seconds_per_work_unit: 30
    embeddings_batch_max_age_credit_work_units: 1000
    embeddings_batch_min_large_job_claim_interval_seconds: 30
    embeddings_batch_small_job_fast_lane_enabled: false
    embeddings_batch_small_job_max_work_units: 100
    embeddings_batch_finalization_first: true

s3:
  enabled: false
  bucket: ""
  region: us-east-1
  prefix: deltallm-logs/
  compression: ""
  accessKeyId: ""
  secretAccessKey: ""
  existingSecret:
    name: ""
    accessKeyIdKey: aws-access-key-id
    secretAccessKeyKey: aws-secret-access-key

prometheus:
  podAnnotations:
    enabled: true
  serviceMonitor:
    enabled: false
    namespace: ""
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

migrationJob:
  enabled: false
  annotations: {}
  hook:
    enabled: false
    deletePolicy: before-hook-creation,hook-succeeded
  backoffLimit: 4
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 300
  resources: {}
  command:
    - sh
    - -c
  args:
    - |
      prisma migrate deploy --schema=./prisma/schema.prisma

postgresql:
  enabled: false
  image:
    tag: latest
  auth:
    username: deltallm
    password: ""
    database: deltallm
  primary:
    persistence:
      enabled: true
      size: 10Gi

redis:
  enabled: false
  image:
    tag: latest
  auth:
    enabled: false
    password: ""
  master:
    persistence:
      enabled: true
      size: 5Gi
