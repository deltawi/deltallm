name: Release Artifacts

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-artifacts-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default
            tag_suffix: ""
            install_presidio: "false"
          - name: presidio
            tag_suffix: "-presidio"
            install_presidio: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: deltallm/deltallm
          tags: |
            type=raw,value=${{ github.event.release.tag_name }}${{ matrix.tag_suffix }}
            type=raw,value=latest${{ matrix.tag_suffix }},enable=${{ github.event.release.prerelease == false }}
          labels: |
            org.opencontainers.image.title=DeltaLLM
            org.opencontainers.image.description=OpenAI-compatible LLM gateway

      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            INSTALL_PRESIDIO=${{ matrix.install_presidio }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  helm-repo:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name }}
      CHART_REPO_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Derive chart release metadata
        shell: bash
        run: |
          set -euo pipefail

          chart_version="${RELEASE_TAG#v}"
          if [[ ! "$chart_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release tag '${RELEASE_TAG}' must look like v0.1.12 or v0.1.12-rc.1"
            exit 1
          fi

          echo "CHART_VERSION=${chart_version}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"

      - name: Build chart dependencies
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update
          helm dependency build ./helm

      - name: Prepare versioned chart package
        shell: bash
        run: |
          set -euo pipefail
          rm -rf /tmp/deltallm-chart /tmp/deltallm-packages
          mkdir -p /tmp/deltallm-chart /tmp/deltallm-packages
          cp -R helm/. /tmp/deltallm-chart/

          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          chart_path = Path("/tmp/deltallm-chart/Chart.yaml")
          values_path = Path("/tmp/deltallm-chart/values.yaml")
          chart_version = os.environ["CHART_VERSION"]
          release_tag = os.environ["RELEASE_TAG"]

          chart_text = chart_path.read_text()
          chart_text = re.sub(r"(?m)^version:\s*.*$", f"version: {chart_version}", chart_text, count=1)
          chart_text = re.sub(r'(?m)^appVersion:\s*.*$', f'appVersion: "{release_tag}"', chart_text, count=1)
          chart_path.write_text(chart_text)

          values_text = values_path.read_text()
          values_text = re.sub(r'(?m)^  tag:\s*.*$', f'  tag: "{release_tag}"', values_text, count=1)
          values_path.write_text(values_text)
          PY

      - name: Validate packaged chart
        run: |
          helm lint /tmp/deltallm-chart \
            --set secret.values.masterKey=sk-release-validation-1234567890abcdeA1 \
            --set secret.values.saltKey=release-validation-salt-0123456789abcdef0123456789abcdef
          helm template deltallm /tmp/deltallm-chart \
            --set secret.values.masterKey=sk-release-validation-1234567890abcdeA1 \
            --set secret.values.saltKey=release-validation-salt-0123456789abcdef0123456789abcdef \
            > /dev/null

      - name: Package chart
        run: helm package /tmp/deltallm-chart --destination /tmp/deltallm-packages

      - name: Publish chart repository to gh-pages
        shell: bash
        env:
          GH_PAGES_DIR: /tmp/deltallm-gh-pages
        run: |
          set -euo pipefail

          rm -rf "${GH_PAGES_DIR}"

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages
            git worktree add "${GH_PAGES_DIR}" origin/gh-pages
            cd "${GH_PAGES_DIR}"
            git switch -c gh-pages --track origin/gh-pages || git switch gh-pages
          else
            git worktree add -b gh-pages "${GH_PAGES_DIR}" HEAD
            cd "${GH_PAGES_DIR}"
            git rm -rf . >/dev/null 2>&1 || true
            find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          fi

          cp "/tmp/deltallm-packages/deltallm-${CHART_VERSION}.tgz" .

          if [[ -f index.yaml ]]; then
            helm repo index . --url "${CHART_REPO_URL}" --merge index.yaml
          else
            helm repo index . --url "${CHART_REPO_URL}"
          fi

          cat > index.html <<EOF
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>DeltaLLM Helm Repository</title>
          </head>
          <body>
            <h1>DeltaLLM Helm Repository</h1>
            <p>Add this repository with:</p>
            <pre><code>helm repo add deltallm ${CHART_REPO_URL}
          helm repo update</code></pre>
            <p>See the main project docs for deployment examples.</p>
          </body>
          </html>
          EOF

          touch .nojekyll

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .nojekyll index.html index.yaml "deltallm-${CHART_VERSION}.tgz"
          if git diff --cached --quiet; then
            echo "No chart repo changes to publish"
            exit 0
          fi
          git commit -m "Publish Helm chart ${CHART_VERSION}"
          git push origin gh-pages
