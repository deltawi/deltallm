# DeltaLLM starter configuration
#
# This file is intentionally opinionated:
# - the active settings are the minimum recommended local/dev setup
# - advanced features stay commented until you need them
# - secrets should come from environment variables, not hardcoded values
#
# Quick path:
# 1. Copy this file to config.yaml
# 2. Set the required environment variables from docs/getting-started/docker.md
# 3. Start DeltaLLM and verify /v1/models
# 4. After the first successful seed, you can set
#    general_settings.model_deployment_bootstrap_from_config: false
#    and manage deployments from the Admin UI or API

model_list:
  # Sample deployment used by the quickstart docs.
  # Keep this if you want to bootstrap one OpenAI-backed chat model on first start.
  - model_name: gpt-4o-mini
    deltallm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY
      api_base: https://api.openai.com/v1
      timeout: 60

router_settings:
  # Simple defaults are best for a first setup.
  routing_strategy: simple-shuffle
  num_retries: 0
  retry_after: 1
  timeout: 600
  cooldown_time: 60
  allowed_fails: 0

general_settings:
  instance_name: DeltaLLM

  # Required secrets
  master_key: os.environ/DELTALLM_MASTER_KEY
  salt_key: os.environ/DELTALLM_SALT_KEY

  # Database and Redis
  # In Docker Compose, DATABASE_URL and REDIS_URL are wired automatically.
  database_url: os.environ/DATABASE_URL
  redis_url: os.environ/REDIS_URL
  db_pool_size: 20
  db_pool_timeout: 30

  # Admin session login
  # Set these only if you want an initial browser-login admin account created on boot.
  platform_bootstrap_admin_email: os.environ/PLATFORM_BOOTSTRAP_ADMIN_EMAIL
  platform_bootstrap_admin_password: os.environ/PLATFORM_BOOTSTRAP_ADMIN_PASSWORD
  auth_session_ttl_hours: 12

  # Recommended startup path:
  # - db_only: manage deployments from the Admin UI or API
  # - bootstrap_from_config: true so the sample model seeds on first boot
  #   After the first successful seed, set this back to false for steady-state use.
  model_deployment_source: db_only
  model_deployment_bootstrap_from_config: true

  # Optional performance and auth-cache tuning
  api_key_auth_cache_ttl_seconds: 300
  cache_enabled: false
  cache_backend: memory
  cache_ttl: 3600
  cache_max_size: 10000

  # Governance notifications are opt-in and disabled by default.
  governance_notifications_enabled: false
  budget_notifications_enabled: false
  key_lifecycle_notifications_enabled: false
  budget_alert_ttl_seconds: 3600

  # Email delivery is optional.
  # Enable this when you want invitations, password reset, test email, or governance notifications.
  # For local/dev, point SMTP at Mailpit/MailHog.
  # For production, use smtp, resend, or sendgrid with real credentials.
  # email_base_url must be the public app origin when email is enabled.
  #
  # email_enabled: true
  # email_provider: smtp
  # email_from_address: no-reply@example.com
  # email_reply_to: support@example.com
  # email_base_url: http://localhost:4000
  # email_worker_enabled: true
  # email_max_attempts: 5
  # email_retry_initial_seconds: 60
  # email_retry_max_seconds: 3600
  #
  # SMTP example
  # smtp_host: localhost
  # smtp_port: 1025
  # smtp_username: null
  # smtp_password: null
  # smtp_use_tls: false
  #
  # Resend example
  # email_provider: resend
  # resend_api_key: os.environ/RESEND_API_KEY
  #
  # SendGrid example
  # email_provider: sendgrid
  # sendgrid_api_key: os.environ/SENDGRID_API_KEY

  # SSO is optional.
  # Enable this only after Redis is configured because SSO callback state is stored server-side.
  # DeltaLLM keeps SSO disabled if Redis-backed state storage is unavailable.
  #
  # enable_sso: true
  # sso_provider: oidc
  # sso_client_id: os.environ/SSO_CLIENT_ID
  # sso_client_secret: os.environ/SSO_CLIENT_SECRET
  # sso_authorize_url: https://idp.example.com/oauth2/authorize
  # sso_token_url: https://idp.example.com/oauth2/token
  # sso_userinfo_url: https://idp.example.com/oauth2/userinfo
  # sso_redirect_uri: http://localhost:4000/auth/callback
  # sso_scope: openid email profile
  # sso_admin_email_list:
  #   - admin@example.com
  # sso_default_team_id: team-123
  # sso_state_ttl_seconds: 600

  # Optional JWT bearer authentication for proxy requests.
  #
  # enable_jwt_auth: true
  # jwt_public_key_url: https://idp.example.com/.well-known/jwks.json
  # jwt_audience: deltallm
  # jwt_issuer: https://idp.example.com/

  # Optional health checks and observability
  #
  # background_health_checks: true
  # health_check_interval: 300
  # health_check_model: gpt-4o-mini
  # prometheus_endpoint: /metrics
  # metrics_retention_days: 30

deltallm_settings:
  # Keep callback and guardrail config minimal in the starter file.
  success_callback:
    - prometheus
  failure_callback:
    - prometheus
  turn_off_message_logging: false

  # Optional S3 callback target for request logs or exports.
  #
  # callback_settings:
  #   s3:
  #     bucket: os.environ/DELTALLM_S3_BUCKET
  #     region: us-east-1
  #     prefix: deltallm-logs/

  # Optional built-in guardrail examples.
  # Uncomment these only after their provider-specific dependencies are configured.
  #
  # guardrails:
  #   - guardrail_name: presidio-pii
  #     deltallm_params:
  #       guardrail: src.guardrails.presidio.PresidioGuardrail
  #       mode: pre_call
  #       default_on: true
  #       default_action: block
  #       anonymize: true
  #       threshold: 0.5
  #       entities:
  #         - EMAIL_ADDRESS
  #         - PHONE_NUMBER
  #         - US_SSN
  #   - guardrail_name: lakera-prompt-injection
  #     deltallm_params:
  #       guardrail: src.guardrails.lakera.LakeraGuardrail
  #       mode: pre_call
  #       default_on: true
  #       default_action: block
  #       api_key: os.environ/LAKERA_API_KEY
  #       threshold: 0.5
  #       fail_open: false
